name: Deploy and E2E Test

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev/prod)'
        required: true
        type: string
      affected-apps:
        description: 'Comma-separated list of affected applications'
        required: true
        type: string
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '22'
        type: string
      e2e-base-url:
        description: 'Base URL for E2E tests'
        required: true
        type: string
      backend-url:
        description: 'Backend API URL'
        required: true
        type: string
      intro-video-url:
        description: 'Marketing intro video URL for the frontend build'
        required: true
        type: string
      paynote-demo-video-url:
        description: 'PayNote walkthrough video URL for auth pages'
        required: true
        type: string
    outputs:
      deployment-success:
        description: 'Whether deployment was successful'
        value: ${{ jobs.deploy.outputs.success }}
      e2e-success:
        description: 'Whether E2E tests were successful'
        value: ${{ jobs.e2e-tests.outputs.success }}

env:
  NODE_ENV: ci

jobs:
  # ============================================================================
  # DEPLOYMENT
  # ============================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}
    outputs:
      success: ${{ steps.deploy-status.outputs.success }}

    permissions:
      id-token: write
      contents: read
      actions: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ inputs.environment }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy affected apps to ${{ inputs.environment }}
        id: deploy-apps
        run: |
          # Check if there are any apps to deploy
          if [ -z "${{ inputs.affected-apps }}" ] || [ "${{ inputs.affected-apps }}" = "" ]; then
            echo "ℹ️ No affected apps to deploy, skipping deployment..."
            echo "success=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          IFS=',' read -ra APPS <<< "${{ inputs.affected-apps }}"
          SUCCESS=true

          for app in "${APPS[@]}"; do
            if [ -n "$app" ]; then
              echo "🚀 Deploying $app to ${{ inputs.environment }}..."
              echo "🚀 BANK_API_URL=$BANK_API_URL"
              if [ -n "$INTRO_VIDEO_URL" ]; then
                echo "🎬 INTRO_VIDEO_URL=$INTRO_VIDEO_URL"
              fi
              if [ -n "$PAYNOTE_DEMO_VIDEO_URL" ]; then
                echo "🎬 PAYNOTE_DEMO_VIDEO_URL=$PAYNOTE_DEMO_VIDEO_URL"
              fi
              if npx nx deploy $app --environment=${{ inputs.environment }}; then
                echo "✅ Successfully deployed $app"
              else
                echo "❌ Failed to deploy $app"
                SUCCESS=false
              fi
            fi
          done

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
        env:
          # Set API and marketing video URLs for frontend builds
          BANK_API_URL: ${{ inputs.backend-url }}
          INTRO_VIDEO_URL: ${{ inputs.intro-video-url }}
          PAYNOTE_DEMO_VIDEO_URL: ${{ inputs.paynote-demo-video-url }}

      - name: Set deployment status
        id: deploy-status
        run: |
          if [ "${{ steps.deploy-apps.outputs.success }}" == "true" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ All deployments completed successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ One or more deployments failed"
            exit 1
          fi

  # ============================================================================
  # E2E TESTS
  # ============================================================================
  e2e-tests:
    name: E2E Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [deploy]
    if: always() && needs.deploy.outputs.success == 'true'
    outputs:
      success: ${{ steps.e2e-status.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Install Playwright browsers
        run: |
          echo "📦 Installing Playwright browsers..."
          npx playwright install --with-deps
          echo "✅ Playwright browsers installed successfully"

      - name: Wait for deployment to be ready
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          if [ -n "$BANK_API_URL" ]; then
            npm run wait-for-backend
          else
            sleep 30  # Fallback for non-API deployments
          fi

      - name: Run E2E tests
        id: run-e2e
        run: |
          # Check if any deployments actually happened
          if [ -z "${{ inputs.affected-apps }}" ] || [ "${{ inputs.affected-apps }}" = "" ]; then
            echo "ℹ️ No affected apps deployed, skipping E2E tests..."
            echo "success=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "🧪 Running E2E tests against ${{ inputs.environment }}..."
          echo "Target URL: $E2E_BASE_URL"
          if npx nx affected -t e2e; then
            echo "✅ E2E tests passed"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ E2E tests failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          CI: true
          E2E_BASE_URL: ${{ inputs.e2e-base-url }}
          BANK_API_URL: ${{ inputs.backend-url }}

      - name: Set E2E status
        id: e2e-status
        if: always()
        run: |
          if [ "${{ steps.run-e2e.outputs.success }}" == "true" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

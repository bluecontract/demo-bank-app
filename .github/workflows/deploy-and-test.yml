name: Deploy and E2E Test

on:
  workflow_call:
    inputs:
      environment:
        description: 'Target environment (dev/prod)'
        required: true
        type: string
      affected-apps:
        description: 'Comma-separated list of affected applications'
        required: true
        type: string
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '20'
        type: string
      e2e-base-url:
        description: 'Base URL for E2E tests'
        required: true
        type: string
      backend-url:
        description: 'Backend API URL for health checks'
        required: true
        type: string
    outputs:
      deployment-success:
        description: 'Whether deployment was successful'
        value: ${{ jobs.deploy.outputs.success }}
      e2e-success:
        description: 'Whether E2E tests were successful'
        value: ${{ jobs.e2e-tests.outputs.success }}

env:
  NODE_ENV: ci

jobs:
  # ============================================================================
  # DEPLOYMENT
  # ============================================================================
  deploy:
    name: Deploy to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    outputs:
      success: ${{ steps.deploy-status.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: GitHubActions-${{ inputs.environment }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy affected apps to ${{ inputs.environment }}
        id: deploy-apps
        run: |
          IFS=',' read -ra APPS <<< "${{ inputs.affected-apps }}"
          SUCCESS=true

          for app in "${APPS[@]}"; do
            if [ -n "$app" ]; then
              echo "🚀 Deploying $app to ${{ inputs.environment }}..."
              if npx nx deploy $app --environment=${{ inputs.environment }}; then
                echo "✅ Successfully deployed $app"
              else
                echo "❌ Failed to deploy $app"
                SUCCESS=false
              fi
            fi
          done

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT

      - name: Set deployment status
        id: deploy-status
        run: |
          if [ "${{ steps.deploy-apps.outputs.success }}" == "true" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
            echo "✅ All deployments completed successfully"
          else
            echo "success=false" >> $GITHUB_OUTPUT
            echo "❌ One or more deployments failed"
            exit 1
          fi

  # ============================================================================
  # E2E TESTS
  # ============================================================================
  e2e-tests:
    name: E2E Tests (${{ inputs.environment }})
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && needs.deploy.outputs.success == 'true'
    outputs:
      success: ${{ steps.e2e-status.outputs.success }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Wait for deployment to be ready
        run: |
          echo "⏳ Waiting for deployment to be ready..."
          sleep 30  # Give the deployment time to be accessible

      - name: Run E2E tests
        id: run-e2e
        run: |
          echo "🧪 Running E2E tests against ${{ inputs.environment }}..."
          echo "Target URL: $E2E_BASE_URL"
          if npx nx affected -t e2e; then
            echo "✅ E2E tests passed"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ E2E tests failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          CI: true
          E2E_BASE_URL: ${{ inputs.e2e-base-url }}
          BACKEND_URL: ${{ inputs.backend-url }}

      - name: Set E2E status
        id: e2e-status
        if: always()
        run: |
          if [ "${{ steps.run-e2e.outputs.success }}" == "true" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

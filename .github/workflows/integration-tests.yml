name: Integration Tests

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '22'
        type: string
    outputs:
      success:
        description: 'Whether integration tests passed'
        value: ${{ jobs.integration-tests.outputs.success }}

env:
  NODE_ENV: ci

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      success: ${{ steps.test-result.outputs.success }}

    services:
      # LocalStack as a service container (reliable for CI)
      localstack:
        image: localstack/localstack:latest
        ports:
          - 4566:4566
          - 4510-4559:4510-4559
        env:
          DEBUG: 1
          DOCKER_HOST: unix:///var/run/docker.sock
        volumes:
          - /var/run/docker.sock:/var/run/docker.sock
        options: >-
          --health-cmd="curl -f http://localhost:4566/_localstack/health || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3
          --health-start-period=30s

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Cache node_modules
        id: cache-modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-modules-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-modules-

      - name: Install dependencies
        if: steps.cache-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Setup Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Wait for LocalStack to be ready
        run: |
          echo "⏳ Waiting for LocalStack to be ready..."
          timeout 60 bash -c 'until curl -f http://localhost:4566/_localstack/health; do sleep 2; done'
          echo "✅ LocalStack is ready"

      - name: Verify LocalStack health
        run: |
          echo "🔍 Checking LocalStack health..."
          curl -s http://localhost:4566/_localstack/health | jq '.'

      - name: Build affected projects
        run: npx nx affected -t build

      - name: Run integration tests
        id: run-integration-tests
        run: |
          echo "🧪 Running integration tests directly (LocalStack service container already available)..."

          # Set LocalStack environment variables
          export AWS_ACCESS_KEY_ID=test
          export AWS_SECRET_ACCESS_KEY=test
          export AWS_DEFAULT_REGION=us-east-1
          export AWS_ENDPOINT_URL=http://localhost:4566

          # Run integration tests using CI-specific target (no localstack:serve dependency)
          if npx nx run @demo-bank-app/bank-api:test:integration:ci --skip-nx-cache; then
            echo "✅ Integration tests passed"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Integration tests failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Set final result
        id: test-result
        if: always()
        run: |
          if [ "${{ steps.run-integration-tests.outputs.success }}" == "true" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: LocalStack logs (on failure)
        if: failure()
        run: |
          echo "📋 LocalStack service logs:"
          docker logs $(docker ps -q --filter ancestor=localstack/localstack:latest) || echo "No LocalStack container found"

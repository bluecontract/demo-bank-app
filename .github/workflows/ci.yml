name: CI/CD Pipeline

on:
  push:
    branches: [main, 'feature/*', 'bugfix/*', 'hotfix/*']
  pull_request:
    branches: [main]

env:
  NODE_ENV: ci

permissions:
  id-token: write # Required for OIDC
  contents: read
  pull-requests: write # For PR comments
  actions: read

jobs:
  # ============================================================================
  # QUALITY GATES & SETUP (Reusable workflow)
  # ============================================================================
  quality-gates:
    name: Quality Gates & Setup
    uses: ./.github/workflows/shared-setup.yml
    with:
      node-version: '20'
      run-security-scan: ${{ github.event_name == 'pull_request' }}
    secrets: inherit

  # ============================================================================
  # INTEGRATION TESTS (LocalStack required)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    uses: ./.github/workflows/integration-tests.yml
    needs: [quality-gates]
    with:
      node-version: '20'
    secrets: inherit

  # ============================================================================
  # LOCAL STACK E2E TESTS (Pre-deployment validation)
  # ============================================================================
  local-stack-e2e:
    name: Local Stack E2E Tests
    uses: ./.github/workflows/local-stack-e2e.yml
    needs: [quality-gates, integration-tests]
    with:
      node-version: '20'
    secrets: inherit

  # ============================================================================
  # DEPLOY TO DEV (On PR to main)
  # ============================================================================
  deploy-dev:
    name: Deploy & Test (Dev)
    uses: ./.github/workflows/deploy-and-test.yml
    needs: [quality-gates, integration-tests, local-stack-e2e]
    if: github.event_name == 'pull_request' && github.base_ref == 'main' && needs.quality-gates.outputs.has-affected-apps == 'true'
    with:
      environment: 'dev'
      affected-apps: ${{ needs.quality-gates.outputs.affected-apps }}
      node-version: '20'
      e2e-base-url: 'https://dev.your-domain.com'
      backend-url: 'https://api-dev.your-domain.com'
    secrets: inherit

  # ============================================================================
  # DEPLOY TO PRODUCTION (On merge to main)
  # ============================================================================
  deploy-production:
    name: Deploy & Test (Production)
    uses: ./.github/workflows/deploy-and-test.yml
    needs: [quality-gates, integration-tests, local-stack-e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.quality-gates.outputs.has-affected-apps == 'true'
    with:
      environment: 'prod'
      affected-apps: ${{ needs.quality-gates.outputs.affected-apps }}
      node-version: '20'
      e2e-base-url: 'https://your-domain.com'
      backend-url: 'https://api.your-domain.com'
    secrets: inherit

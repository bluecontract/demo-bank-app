name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_ENV: ci

permissions:
  id-token: write # Required for OIDC
  contents: read
  pull-requests: write # For PR comments
  actions: read

jobs:
  # ============================================================================
  # QUALITY GATES (always run)
  # ============================================================================
  quality-gates:
    name: Quality Gates & Setup
    uses: ./.github/workflows/shared-setup.yml
    with:
      node-version: '22'
      run-security-scan: ${{ github.event_name == 'pull_request' }}
    secrets: inherit

  # ============================================================================
  # INTEGRATION TESTS (always run)
  # ============================================================================
  integration-tests:
    name: Integration Tests
    uses: ./.github/workflows/integration-tests.yml
    needs: [quality-gates]
    with:
      node-version: '22'
    secrets: inherit

  # ============================================================================
  # LOCAL STACK E2E TESTS (always run)
  # ============================================================================
  # local-stack-e2e:
  #   name: Local Stack E2E Tests
  #   uses: ./.github/workflows/local-stack-e2e.yml
  #   needs: [quality-gates, integration-tests]
  #   with:
  #     node-version: '22'
  #   secrets: inherit

  # ============================================================================
  # DEPLOY TO DEV (On PR to main OR merge to main)
  # ============================================================================
  deploy-dev:
    name: Deploy & Test (Dev)
    uses: ./.github/workflows/deploy-and-test.yml
    needs: [quality-gates, integration-tests]
    if: |
      needs.quality-gates.outputs.has-affected-apps == 'true' && (
        (github.event_name == 'pull_request' && github.base_ref == 'main') ||
        (github.event_name == 'push' && github.ref == 'refs/heads/main')
      )
    with:
      environment: 'dev'
      affected-apps: ${{ needs.quality-gates.outputs.affected-apps }}
      node-version: '22'
      e2e-base-url: '${{ vars.DEV_FRONTEND_URL }}'
      backend-url: '${{ vars.DEV_BACKEND_URL }}'
      intro-video-url: '${{ vars.DEV_INTRO_VIDEO_URL }}'
      paynote-demo-video-url: '${{ vars.DEV_PAYNOTE_DEMO_VIDEO_URL }}'
    secrets: inherit

  # ============================================================================
  # DEPLOY TO PRODUCTION (Only on merge to main, after dev success)
  # ============================================================================
  deploy-production:
    name: Deploy & Test (Production)
    uses: ./.github/workflows/deploy-and-test.yml
    needs: [quality-gates, deploy-dev]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.deploy-dev.outputs.deployment-success == 'true' &&
      needs.deploy-dev.outputs.e2e-success == 'true'
    with:
      environment: 'prod'
      affected-apps: ${{ needs.quality-gates.outputs.affected-apps }}
      node-version: '22'
      e2e-base-url: '${{ vars.PROD_FRONTEND_URL }}'
      backend-url: '${{ vars.PROD_BACKEND_URL }}'
      intro-video-url: '${{ vars.PROD_INTRO_VIDEO_URL }}'
      paynote-demo-video-url: '${{ vars.PROD_PAYNOTE_DEMO_VIDEO_URL }}'
    secrets: inherit

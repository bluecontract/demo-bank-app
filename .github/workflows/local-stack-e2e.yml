name: Local Stack E2E Tests

on:
  workflow_call:
    inputs:
      node-version:
        description: 'Node.js version to use'
        required: false
        default: '22'
        type: string
    outputs:
      success:
        description: 'Whether local stack E2E tests passed'
        value: ${{ jobs.local-stack-e2e.outputs.success }}

env:
  NODE_ENV: ci

jobs:
  local-stack-e2e:
    name: Local Stack E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      success: ${{ steps.test-result.outputs.success }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: 'npm'

      - name: Install AWS SAM CLI
        run: |
          echo "📦 Installing AWS SAM CLI..."
          wget -q https://github.com/aws/aws-sam-cli/releases/latest/download/aws-sam-cli-linux-x86_64.zip
          unzip -q aws-sam-cli-linux-x86_64.zip -d sam-installation
          sudo ./sam-installation/install --update
          rm -rf sam-installation aws-sam-cli-linux-x86_64.zip
          sam --version

      - name: Install LocalStack CLI
        run: |
          echo "📦 Installing LocalStack CLI..."
          pip install localstack
          localstack --version
          pip install aws-sam-cli-local
          samlocal --version

      - name: Install dependencies
        run: npm ci

      - name: Setup Nx SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Build affected projects
        run: npx nx affected -t build

      - name: Start services using serve:stack
        run: |
          echo "🚀 Starting services using serve:stack..."

          # Set environment variables
          export BANK_API_URL=http://localhost:3000

          # Start all services in background
          npm run serve:stack &

          # Wait for LocalStack with retries
          echo "⏳ Waiting for LocalStack..."
          for i in {1..30}; do
            if curl -f http://localhost:4566/_localstack/health > /dev/null 2>&1; then
              echo "✅ LocalStack is ready (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ LocalStack failed to start after 30 attempts"
              exit 1
            fi
            sleep 3
          done

          # Wait for backend API with retries
          echo "⏳ Waiting for backend API..."
          for i in {1..30}; do
            if curl -f http://localhost:3000/health > /dev/null 2>&1; then
              echo "✅ Backend API is ready (attempt $i)"
              # Additional stability check - wait a bit more and check again
              sleep 5
              if curl -f http://localhost:3000/health > /dev/null 2>&1; then
                echo "✅ Backend API stability confirmed"
                break
              else
                echo "⚠️ Backend API became unstable, continuing to wait..."
                continue
              fi
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Backend API failed to start after 30 attempts"
              exit 1
            fi
            sleep 3
          done

          # Wait for frontend with retries
          echo "⏳ Waiting for frontend..."
          for i in {1..30}; do
            if curl -f http://localhost:4200 > /dev/null 2>&1; then
              echo "✅ Frontend is ready (attempt $i)"
              break
            fi
            if [ $i -eq 30 ]; then
              echo "❌ Frontend failed to start after 30 attempts"
              exit 1
            fi
            sleep 3
          done

          # Final health verification
          echo "🔍 Final health verification..."
          curl -s http://localhost:4566/_localstack/health | jq '.' || echo "LocalStack health check failed"
          curl -s http://localhost:3000/health | jq '.' || echo "Backend health check failed"
          echo "✅ All services are ready and verified"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run E2E tests
        id: run-e2e-tests
        run: |
          echo "🧪 Running E2E tests..."

          # Set environment variables for E2E tests
          export E2E_BASE_URL=http://localhost:4200
          export BANK_API_URL=http://localhost:3000
          export CI=true

          # Run e2e tests
          if npm run e2e; then
            echo "✅ E2E tests passed"
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ E2E tests failed"
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Set final result
        id: test-result
        if: always()
        run: |
          if [ "${{ steps.run-e2e-tests.outputs.success }}" == "true" ]; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload Playwright report (on failure)
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report-local-stack
          path: apps/bank-web-app-e2e/test-output/
          retention-days: 7

      - name: Show service logs (on failure)
        if: failure()
        run: |
          echo "📋 Service logs for debugging:"
          echo "=== LocalStack logs ==="
          docker logs $(docker ps -q --filter name=localstack-demo-blue) || echo "No LocalStack container found"

          echo "=== Service health checks ==="
          curl -s http://localhost:4566/_localstack/health || echo "LocalStack not responding"
          curl -s http://localhost:3000/health || echo "Backend API not responding" 
          curl -s http://localhost:4200 || echo "Frontend not responding"

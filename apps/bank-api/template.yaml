AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Blue Demo Bank Lambda API

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  DomainName:
    Type: String
    Default: ''
    Description: 'Optional: Custom domain name (e.g., api.example.com)'
  CertificateArn:
    Type: String
    Default: ''
    Description: 'Optional: ACM certificate ARN (must be in the same region as the API) when using a custom domain'
  HostedZoneId:
    Type: String
    Default: ''
    Description: 'Optional: Route53 hosted zone ID if you want CloudFormation to create an alias record'

Conditions:
  UseCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Not [!Equals [!Ref CertificateArn, '']]
  ManageCustomDomainDns: !And
    - !Condition UseCustomDomain
    - !Not [!Equals [!Ref HostedZoneId, '']]

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs22.x
    CodeUri: ../../dist/apps/bank-api/
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1

Resources:
  # DynamoDB Table for Single Table Design
  BankTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'demo-bank-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: AUTH_GSI1PK
          AttributeType: S
        - AttributeName: AUTH_GSI1SK
          AttributeType: S
        - AttributeName: BANKING_GSI1PK
          AttributeType: S
        - AttributeName: BANKING_GSI1SK
          AttributeType: S

        - AttributeName: BANKING_GSI2PK
          AttributeType: S
        - AttributeName: BANKING_GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # AUTH_GSI1 –(PK = EMAIL#email, SK PROFILE)` get user by email.
        - IndexName: AUTH_GSI1
          KeySchema:
            - AttributeName: AUTH_GSI1PK
              KeyType: HASH
            - AttributeName: AUTH_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # BANKING_GSI1 –(PK = USER#id, SK createdAt)` list accounts per user.
        - IndexName: BANKING_GSI1
          KeySchema:
            - AttributeName: BANKING_GSI1PK
              KeyType: HASH
            - AttributeName: BANKING_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # BANKING_GSI2 – (PK = ACCOUNT#id, POST#<createdAt>)` for transaction feed, sort by time
        - IndexName: BANKING_GSI2
          KeySchema:
            - AttributeName: BANKING_GSI2PK
              KeyType: HASH
            - AttributeName: BANKING_GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: database

  # Secrets Manager Secret for JWT Secret
  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-bank-app/${Environment}/auth-jwt-secret'
      Description: !Sub 'JWT signing secret for demo-bank-app ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'secret'
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: auth

  OpenAiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-bank-app/${Environment}/openai-api-key'
      Description: !Sub 'OpenAI API key for demo-bank-app ${Environment}'
      SecretString: |
        {"openAiApiKey":""}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: openai

  MyOsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-bank-app/${Environment}/myos-credentials'
      Description: !Sub 'MyOS credentials for demo-bank-app ${Environment}'
      SecretString: |
        {"apiKey":"","accountId":""}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: myos

  BankApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'bank-api-${Environment}'
      StageName: !Ref Environment
      EndpointConfiguration:
        Type: REGIONAL

  ApiCustomDomain:
    Type: AWS::ApiGateway::DomainName
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref DomainName
      EndpointConfiguration:
        Types: ['REGIONAL']
      RegionalCertificateArn: !Ref CertificateArn
      SecurityPolicy: TLS_1_2

  ApiCustomDomainMapping:
    Type: AWS::ApiGateway::BasePathMapping
    Condition: UseCustomDomain
    Properties:
      DomainName: !Ref DomainName
      RestApiId: !Ref BankApi
      Stage: !Ref Environment
    DependsOn: BankApi

  ApiCustomDomainRecord:
    Type: AWS::Route53::RecordSet
    Condition: ManageCustomDomainDns
    Properties:
      Name: !Ref DomainName
      Type: A
      HostedZoneId: !Ref HostedZoneId
      AliasTarget:
        DNSName: !GetAtt ApiCustomDomain.RegionalDomainName
        HostedZoneId: !GetAtt ApiCustomDomain.RegionalHostedZoneId
        EvaluateTargetHealth: false
    DependsOn: ApiCustomDomainMapping

  BankLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'blue-bank-api-${Environment}'
      Handler: main.handler
      CodeUri: ../../dist/apps/bank-api/lambda/
      Description: Banking API Lambda function
      Environment:
        Variables:
          AUTH_DYNAMO_TABLE_NAME: !Ref BankTable
          BANKING_DYNAMO_TABLE_NAME: !Ref BankTable
          JWT_SECRET_ARN: !Ref JwtSecret
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAiKeySecret
          MYOS_SECRET_ARN: !Ref MyOsSecret
          JWT_TTL_SECONDS: 3600
          TEST_USER_TTL_SECONDS: 600 # 10 minutes
          SERVICE_NAME: !Sub 'bank-api-${Environment}'
          LOG_LEVEL: INFO
          METRICS_NAMESPACE: !Sub 'DemoBlue/${Environment}'
          AWS_ENDPOINT_URL: '' # only for local development
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref JwtSecret
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref OpenAiKeySecret
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref MyOsSecret
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        HealthApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /health
            Method: GET
        HealthOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /health
            Method: OPTIONS
        SignUpApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signup
            Method: POST
        SignUpOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signup
            Method: OPTIONS
        SignInApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signin
            Method: POST
        SignInOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signin
            Method: OPTIONS
        CreateAccountApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts
            Method: POST
        ListAccountsApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts
            Method: GET
        V1AccountsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts
            Method: OPTIONS
        GetAccountApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}
            Method: GET
        GetAccountOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}
            Method: OPTIONS
        FundAccountApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}/funding
            Method: POST
        FundAccountOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}/funding
            Method: OPTIONS
        TransferMoneyApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/transfers
            Method: POST
        TransferMoneyOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/transfers
            Method: OPTIONS
        ListTransactionsApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}/transactions
            Method: GET
        ListTransactionsOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}/transactions
            Method: OPTIONS
        GetTransactionApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}/transactions/{txnId}
            Method: GET
        GetTransactionOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/accounts/{accountId}/transactions/{txnId}
            Method: OPTIONS
        ValidatePayNoteApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/validate
            Method: POST
        ValidatePayNoteOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/validate
            Method: OPTIONS
        ParsePayNotePdfApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/parse-pdf
            Method: POST
        ParsePayNotePdfOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/parse-pdf
            Method: OPTIONS
        BootstrapPayNoteApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/bootstrap
            Method: POST
        BootstrapPayNoteOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/bootstrap
            Method: OPTIONS
        PayNoteWebhookApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/webhook
            Method: POST
        PayNoteWebhookOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/webhook
            Method: OPTIONS
  # ------------------------------------------------------------------
  # Seed the FUNDING_SOURCE account and its BALANCE row (idempotent)
  # ------------------------------------------------------------------
  SeedFundingSourceFn:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Handler: seed-funding-source.handler
      CodeUri: ../../dist/apps/bank-api/seed/
      Environment:
        Variables:
          TABLE: !Ref BankTable
          AWS_ENDPOINT_URL: '' # only for local development
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable

  FundingSourceSeed:
    Type: Custom::Seed
    DependsOn: BankTable # ensure table exists first
    Properties:
      ServiceToken: !GetAtt SeedFundingSourceFn.Arn

Outputs:
  BankApiUrl:
    Description: 'API Gateway endpoint URL for Bank API'
    Value: !Sub 'https://${BankApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'
  CustomDomainUrl:
    Condition: UseCustomDomain
    Description: 'Custom domain URL for Bank API'
    Value: !Sub 'https://${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CustomDomainUrl'

  BankApiId:
    Description: 'API Gateway ID'
    Value: !Ref BankApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'

  BankTableName:
    Description: 'DynamoDB table name for banking data (single table design)'
    Value: !Ref BankTable
    Export:
      Name: !Sub '${AWS::StackName}-BankTableName'

  JwtSecretArn:
    Description: 'Secrets Manager secret ARN for JWT secret'
    Value: !Ref JwtSecret
    Export:
      Name: !Sub '${AWS::StackName}-JwtSecretArn'

  OpenAiKeySecretArn:
    Description: 'Secrets Manager secret ARN for OpenAI API key'
    Value: !Ref OpenAiKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-OpenAiKeySecretArn'

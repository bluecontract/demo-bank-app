AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Blue Demo Bank Lambda API

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  AwsEndpointUrl:
    Type: String
    Default: ''
  LambdaAliasName:
    Type: String
    Default: live
  EnableProvisionedConcurrency:
    Type: String
    Default: 'true'
    AllowedValues: ['true', 'false']
  ProvisionedConcurrencyCount:
    Type: Number
    Default: 3
    MinValue: 1
  ApiGatewayEndpointType:
    Type: String
    Default: EDGE
    AllowedValues: [EDGE, REGIONAL]

Conditions:
  IsLocalStackDeployment: !Not [!Equals [!Ref AwsEndpointUrl, '']]
  UseLambdaAlias: !Not [!Condition IsLocalStackDeployment]
  UseProvisionedConcurrency: !And
    - !Condition UseLambdaAlias
    - !Equals [!Ref EnableProvisionedConcurrency, 'true']

Globals:
  Function:
    Timeout: 60
    MemorySize: 2048
    Architectures: [arm64]
    Runtime: nodejs22.x
    CodeUri: ../../dist/apps/bank-api/
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1
        CONTRACT_SUMMARY_TIMEOUT_MS: 45000

Resources:
  # DynamoDB Table for Single Table Design
  BankTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'demo-bank-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: AUTH_GSI1PK
          AttributeType: S
        - AttributeName: AUTH_GSI1SK
          AttributeType: S
        - AttributeName: BANKING_GSI1PK
          AttributeType: S
        - AttributeName: BANKING_GSI1SK
          AttributeType: S

        - AttributeName: BANKING_GSI2PK
          AttributeType: S
        - AttributeName: BANKING_GSI2SK
          AttributeType: S
        - AttributeName: HOLD_GSI1PK
          AttributeType: S
        - AttributeName: HOLD_GSI1SK
          AttributeType: S
        - AttributeName: HOLD_EVENT_GSI1PK
          AttributeType: S
        - AttributeName: HOLD_EVENT_GSI1SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # AUTH_GSI1 –(PK = EMAIL#email, SK PROFILE)` get user by email.
        - IndexName: AUTH_GSI1
          KeySchema:
            - AttributeName: AUTH_GSI1PK
              KeyType: HASH
            - AttributeName: AUTH_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # BANKING_GSI1 –(PK = USER#id, SK createdAt)` list accounts per user.
        - IndexName: BANKING_GSI1
          KeySchema:
            - AttributeName: BANKING_GSI1PK
              KeyType: HASH
            - AttributeName: BANKING_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # BANKING_GSI2 – (PK = ACCOUNT#id, POST#<createdAt>)` for transaction feed, sort by time
        - IndexName: BANKING_GSI2
          KeySchema:
            - AttributeName: BANKING_GSI2PK
              KeyType: HASH
            - AttributeName: BANKING_GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # HOLD_GSI1 – (PK = ACCOUNT#<payerAccountNumber>, SK = <status>#<createdAt>#<holdId>) for pending holds listing
        - IndexName: HOLD_GSI1
          KeySchema:
            - AttributeName: HOLD_GSI1PK
              KeyType: HASH
            - AttributeName: HOLD_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # HOLD_EVENT_GSI1 – (PK = ACCOUNT#<payerAccountNumber>, SK = EVENT#<at>#<holdId>#<eventId>) for full hold history
        - IndexName: HOLD_EVENT_GSI1
          KeySchema:
            - AttributeName: HOLD_EVENT_GSI1PK
              KeyType: HASH
            - AttributeName: HOLD_EVENT_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: database

  # Secrets Manager Secret for JWT Secret
  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-bank-app/${Environment}/auth-jwt-secret'
      Description: !Sub 'JWT signing secret for demo-bank-app ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'secret'
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: auth

  OpenAiKeySecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-bank-app/${Environment}/openai-api-key'
      Description: !Sub 'OpenAI API key for demo-bank-app ${Environment}'
      SecretString: |
        {"openAiApiKey":""}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: openai

  MyOsSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-bank-app/${Environment}/myos-credentials'
      Description: !Sub 'MyOS credentials for demo-bank-app ${Environment}'
      SecretString: |
        {"apiKey":"","accountId":"","baseUrl":""}
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: myos

  SummaryJobsDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'demo-bank-summary-jobs-dlq-${Environment}.fifo'
      FifoQueue: true
      ContentBasedDeduplication: true
      MessageRetentionPeriod: 1209600 # 14 days
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: summary-queue

  SummaryJobsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub 'demo-bank-summary-jobs-${Environment}.fifo'
      FifoQueue: true
      ContentBasedDeduplication: true
      VisibilityTimeout: 180
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt SummaryJobsDeadLetterQueue.Arn
        maxReceiveCount: 6
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-bank-app
        - Key: Component
          Value: summary-queue

  BankApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'bank-api-${Environment}'
      StageName: !Ref Environment
      EndpointConfiguration:
        Type: !Ref ApiGatewayEndpointType

  BankLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'blue-bank-api-${Environment}'
      Handler: main.handler
      CodeUri: ../../dist/apps/bank-api/lambda/
      Description: Banking API Lambda function
      AutoPublishAlias: !Ref LambdaAliasName
      ProvisionedConcurrencyConfig: !If
        - UseProvisionedConcurrency
        - ProvisionedConcurrentExecutions: !Ref ProvisionedConcurrencyCount
        - !Ref AWS::NoValue
      Environment:
        Variables:
          AUTH_DYNAMO_TABLE_NAME: !Ref BankTable
          BANKING_DYNAMO_TABLE_NAME: !Ref BankTable
          JWT_SECRET_ARN: !Ref JwtSecret
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAiKeySecret
          MYOS_SECRET_ARN: !Ref MyOsSecret
          MYOS_API_KEY: ''
          MYOS_ACCOUNT_ID: ''
          MYOS_BASE_URL: ''
          JWT_TTL_SECONDS: 259200 # 3 days
          TEST_USER_TTL_SECONDS: 600 # 10 minutes
          SERVICE_NAME: !Sub 'bank-api-${Environment}'
          SUMMARY_LAMBDA_NAME: !If
            - UseLambdaAlias
            - !Join [
                ':',
                [!GetAtt SummaryLambdaFunction.Arn, !Ref LambdaAliasName],
              ]
            - !Ref SummaryLambdaFunction
          SUMMARY_QUEUE_URL: !Ref SummaryJobsQueue
          LOG_LEVEL: INFO
          METRICS_NAMESPACE: !Sub 'DemoBlue/${Environment}'
          AWS_ENDPOINT_URL: !Ref AwsEndpointUrl # only for local development
          CARD_PAN_SECRET: 'demo-bank-pan-secret'
          CARD_CVC_SECRET: 'demo-bank-cvc-secret'
          CARD_PROCESSOR_TOKEN: 'demo-bank-processor-token'
          CARD_BIN_PREFIX: '123456'
          CARD_SETTLEMENT_ACCOUNT_ID: 'CARD_SETTLEMENT'
          CARD_SETTLEMENT_ACCOUNT_NUMBER: '9999999999'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource:
                - !GetAtt SummaryLambdaFunction.Arn
                - !If
                  - UseLambdaAlias
                  - !Join [
                      ':',
                      [!GetAtt SummaryLambdaFunction.Arn, !Ref LambdaAliasName],
                    ]
                  - !Ref AWS::NoValue
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt SummaryJobsQueue.Arn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref JwtSecret
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref OpenAiKeySecret
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref MyOsSecret
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        ApiRoot:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /
            Method: ANY
        ApiProxy:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /{proxy+}
            Method: ANY

  SummaryLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'blue-bank-summary-${Environment}'
      Handler: summary.handler
      CodeUri: ../../dist/apps/bank-api/lambda/
      Description: Banking summary Lambda function
      AutoPublishAlias: !Ref LambdaAliasName
      ProvisionedConcurrencyConfig: !If
        - UseProvisionedConcurrency
        - ProvisionedConcurrentExecutions: !Ref ProvisionedConcurrencyCount
        - !Ref AWS::NoValue
      Environment:
        Variables:
          AUTH_DYNAMO_TABLE_NAME: !Ref BankTable
          BANKING_DYNAMO_TABLE_NAME: !Ref BankTable
          JWT_SECRET_ARN: !Ref JwtSecret
          OPENAI_API_KEY_SECRET_ARN: !Ref OpenAiKeySecret
          MYOS_SECRET_ARN: !Ref MyOsSecret
          MYOS_API_KEY: ''
          MYOS_ACCOUNT_ID: ''
          MYOS_BASE_URL: ''
          JWT_TTL_SECONDS: 259200 # 3 days
          TEST_USER_TTL_SECONDS: 600 # 10 minutes
          SERVICE_NAME: !Sub 'bank-api-summary-${Environment}'
          SUMMARY_QUEUE_URL: !Ref SummaryJobsQueue
          LOG_LEVEL: INFO
          METRICS_NAMESPACE: !Sub 'DemoBlue/${Environment}'
          AWS_ENDPOINT_URL: !Ref AwsEndpointUrl # only for local development
          CARD_PAN_SECRET: 'demo-bank-pan-secret'
          CARD_CVC_SECRET: 'demo-bank-cvc-secret'
          CARD_PROCESSOR_TOKEN: 'demo-bank-processor-token'
          CARD_BIN_PREFIX: '123456'
          CARD_SETTLEMENT_ACCOUNT_ID: 'CARD_SETTLEMENT'
          CARD_SETTLEMENT_ACCOUNT_NUMBER: '9999999999'
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - sqs:ReceiveMessage
                - sqs:DeleteMessage
                - sqs:GetQueueAttributes
                - sqs:GetQueueUrl
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt SummaryJobsQueue.Arn
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref JwtSecret
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref OpenAiKeySecret
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref MyOsSecret
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        SummaryJobs:
          Type: SQS
          Properties:
            Queue: !GetAtt SummaryJobsQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
        SummaryPayNoteDelivery:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/paynotes/deliveries/{sessionId}/summary
            Method: POST
        SummaryContract:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /v1/contracts/{sessionId}/summary
            Method: POST

  # ------------------------------------------------------------------
  # Seed the FUNDING_SOURCE account and its BALANCE row (idempotent)
  # ------------------------------------------------------------------
  SeedFundingSourceFn:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Handler: seed-funding-source.handler
      CodeUri: ../../dist/apps/bank-api/seed/
      Environment:
        Variables:
          TABLE: !Ref BankTable
          AWS_ENDPOINT_URL: !Ref AwsEndpointUrl # only for local development
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable

  FundingSourceSeed:
    Type: Custom::Seed
    DependsOn: BankTable # ensure table exists first
    Properties:
      ServiceToken: !GetAtt SeedFundingSourceFn.Arn

Outputs:
  BankApiUrl:
    Description: 'API Gateway endpoint URL for Bank API'
    Value: !Sub 'https://${BankApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  BankApiId:
    Description: 'API Gateway ID'
    Value: !Ref BankApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'

  BankTableName:
    Description: 'DynamoDB table name for banking data (single table design)'
    Value: !Ref BankTable
    Export:
      Name: !Sub '${AWS::StackName}-BankTableName'

  JwtSecretArn:
    Description: 'Secrets Manager secret ARN for JWT secret'
    Value: !Ref JwtSecret
    Export:
      Name: !Sub '${AWS::StackName}-JwtSecretArn'

  OpenAiKeySecretArn:
    Description: 'Secrets Manager secret ARN for OpenAI API key'
    Value: !Ref OpenAiKeySecret
    Export:
      Name: !Sub '${AWS::StackName}-OpenAiKeySecretArn'

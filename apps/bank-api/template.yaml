AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Blue Demo Bank Lambda API

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

Globals:
  Function:
    Timeout: 30
    Runtime: nodejs22.x
    CodeUri: ../../dist/apps/bank-api/
    Environment:
      Variables:
        NODE_ENV: !Ref Environment
        AWS_NODEJS_CONNECTION_REUSE_ENABLED: 1

Resources:
  # DynamoDB Table for Single Table Design
  BankTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub 'demo-bank-${Environment}'
      BillingMode: PAY_PER_REQUEST
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      AttributeDefinitions:
        - AttributeName: PK
          AttributeType: S
        - AttributeName: SK
          AttributeType: S
        - AttributeName: AUTH_GSI1PK
          AttributeType: S
        - AttributeName: AUTH_GSI1SK
          AttributeType: S
        - AttributeName: BANKING_GSI1PK
          AttributeType: S
        - AttributeName: BANKING_GSI1SK
          AttributeType: S

        - AttributeName: BANKING_GSI2PK
          AttributeType: S
        - AttributeName: BANKING_GSI2SK
          AttributeType: S
      KeySchema:
        - AttributeName: PK
          KeyType: HASH
        - AttributeName: SK
          KeyType: RANGE
      GlobalSecondaryIndexes:
        # AUTH_GSI1 –(PK = USERNAME#name, SK PROFILE)` get user by username.
        - IndexName: AUTH_GSI1
          KeySchema:
            - AttributeName: AUTH_GSI1PK
              KeyType: HASH
            - AttributeName: AUTH_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        # BANKING_GSI1 –(PK = USER#id, SK createdAt)` list accounts per user.
        - IndexName: BANKING_GSI1
          KeySchema:
            - AttributeName: BANKING_GSI1PK
              KeyType: HASH
            - AttributeName: BANKING_GSI1SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

        # BANKING_GSI2 – (PK = ACCOUNT#id, POST#<createdAt>)` for transaction feed, sort by time
        - IndexName: BANKING_GSI2
          KeySchema:
            - AttributeName: BANKING_GSI2PK
              KeyType: HASH
            - AttributeName: BANKING_GSI2SK
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-blue
        - Key: Component
          Value: database

  # Secrets Manager Secret for JWT Secret
  JwtSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub '/demo-blue/${Environment}/auth-jwt-secret'
      Description: !Sub 'JWT signing secret for demo-blue ${Environment}'
      GenerateSecretString:
        SecretStringTemplate: '{}'
        GenerateStringKey: 'secret'
        PasswordLength: 64
        ExcludeCharacters: '"@/\'
      Tags:
        - Key: Environment
          Value: !Ref Environment
        - Key: Application
          Value: demo-blue
        - Key: Component
          Value: auth

  BankApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub 'bank-api-${Environment}'
      StageName: !Ref Environment
      EndpointConfiguration:
        Type: REGIONAL

  BankLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub 'blue-bank-api-${Environment}'
      Handler: main.handler
      CodeUri: ../../dist/apps/bank-api/lambda/
      Description: Banking API Lambda function
      Environment:
        Variables:
          AUTH_DYNAMO_TABLE_NAME: !Ref BankTable
          BANKING_DYNAMO_TABLE_NAME: !Ref BankTable
          JWT_SECRET_ARN: !Ref JwtSecret
          JWT_TTL_SECONDS: 3600
          TEST_USER_TTL_SECONDS: 600 # 10 minutes
          SERVICE_NAME: !Sub 'bank-api-${Environment}'
          LOG_LEVEL: INFO
          METRICS_NAMESPACE: !Sub 'DemoBlue/${Environment}'
          AWS_ENDPOINT_URL: '' # only for local development
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref JwtSecret
            - Effect: Allow
              Action:
                - cloudwatch:PutMetricData
              Resource: '*'
      Events:
        HealthApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /health
            Method: GET
        HealthOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /health
            Method: OPTIONS
        SignUpApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signup
            Method: POST
        SignUpOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signup
            Method: OPTIONS
        SignInApi:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signin
            Method: POST
        SignInOptions:
          Type: Api
          Properties:
            RestApiId: !Ref BankApi
            Path: /auth/signin
            Method: OPTIONS
  # ------------------------------------------------------------------
  # Seed the FUNDING_SOURCE account and its BALANCE row (idempotent)
  # ------------------------------------------------------------------
  SeedFundingSourceFn:
    Type: AWS::Serverless::Function
    Properties:
      Runtime: nodejs22.x
      Handler: seed-funding-source.handler
      CodeUri: ../../dist/apps/bank-api/seed/
      Environment:
        Variables:
          TABLE: !Ref BankTable
          AWS_ENDPOINT_URL: '' # only for local development
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BankTable

  FundingSourceSeed:
    Type: Custom::Seed
    DependsOn: BankTable # ensure table exists first
    Properties:
      ServiceToken: !GetAtt SeedFundingSourceFn.Arn

Outputs:
  BankApiUrl:
    Description: 'API Gateway endpoint URL for Bank API'
    Value: !Sub 'https://${BankApi}.execute-api.${AWS::Region}.amazonaws.com/${Environment}'
    Export:
      Name: !Sub '${AWS::StackName}-ApiUrl'

  BankApiId:
    Description: 'API Gateway ID'
    Value: !Ref BankApi
    Export:
      Name: !Sub '${AWS::StackName}-ApiId'

  BankTableName:
    Description: 'DynamoDB table name for banking data (single table design)'
    Value: !Ref BankTable
    Export:
      Name: !Sub '${AWS::StackName}-BankTableName'

  JwtSecretArn:
    Description: 'Secrets Manager secret ARN for JWT secret'
    Value: !Ref JwtSecret
    Export:
      Name: !Sub '${AWS::StackName}-JwtSecretArn'

openapi: 3.0.2
paths:
  /health:
    get:
      summary: Health check endpoint
      tags: []
      parameters: []
      operationId: health
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum:
                      - healthy
                  timestamp:
                    type: string
                    format: date-time
                  version:
                    type: string
                  environment:
                    type: string
                required:
                  - status
                  - timestamp
                  - version
                  - environment
info:
  title: Blue Demo Bank API
  version: 1.0.0
  description: >-
    Banking API for Blue Demo Bank - A demonstration of secure banking
    operations with account management and transactions.
  contact:
    name: Blue Labs
    url: https://blue-labs.com
    email: support@blue-labs.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
servers:
  - url: http://localhost:3000
    description: Local development server
  - url: https://api.demo-bank-app-bank.com
    description: Production server
tags:
  - name: Health
    description: Health check operations

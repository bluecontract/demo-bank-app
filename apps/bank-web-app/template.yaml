AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Blue Demo Bank Frontend Infrastructure

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]

  # Optional custom domain (e.g., app.example.com)
  DomainName:
    Type: String
    Default: ''
    Description: 'Optional: Custom domain name (e.g., app.example.com) for CloudFront'

  # Optional ACM cert ARN in us-east-1 for CloudFront
  CertificateArn:
    Type: String
    Default: ''
    Description: 'Optional: ACM certificate ARN (must be in us-east-1) when using a custom domain'

  IntroVideoObjectKey:
    Type: String
    Default: intro-demo.mp4
    Description: 'Object key within the marketing video bucket that contains the intro video file'

  PaynoteDemoVideoObjectKey:
    Type: String
    Default: paynote-demo.mp4
    Description: 'Object key within the marketing video bucket that contains the PayNote walkthrough file'

Conditions:
  UseCustomDomain: !And
    - !Not [!Equals [!Ref DomainName, '']]
    - !Not [!Equals [!Ref CertificateArn, '']]

Resources:
  # S3 Bucket for static website hosting (kept private)
  FrontendBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'demo-bank-app-frontend-${Environment}'
      # Keep bucket private - CloudFront will access via OAC
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Origin Access Control (OAC) - replaces deprecated OAI
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub 'OAC-${Environment}-FrontendBucket'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  LoginDemoVideoBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub 'demo-bank-app-login-demo-${Environment}'
      VersioningConfiguration:
        Status: Enabled
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      CorsConfiguration:
        CorsRules:
          - AllowedHeaders: ['*']
            AllowedMethods: [GET, HEAD, OPTIONS]
            AllowedOrigins: ['*']
            MaxAge: 3600

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt FrontendBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: '' # Must be empty when using OAC
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods: [GET, HEAD, OPTIONS]
          CachedMethods: [GET, HEAD]
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # AWS Managed CachingOptimized
          Compress: true
        CustomErrorResponses:
          - ErrorCode: 403
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 300
          - ErrorCode: 404
            ResponsePagePath: /index.html
            ResponseCode: 200
            ErrorCachingMinTTL: 300
        PriceClass: PriceClass_100
        # Add alias only when using a custom domain
        Aliases: !If
          - UseCustomDomain
          - [!Ref DomainName]
          - !Ref AWS::NoValue
        # Attach ACM cert only when provided
        ViewerCertificate: !If
          - UseCustomDomain
          - {
              AcmCertificateArn: !Ref CertificateArn,
              SslSupportMethod: sni-only,
              MinimumProtocolVersion: TLSv1.2_2021,
            }
          - !Ref AWS::NoValue

  # Bucket Policy allowing CloudFront OAC access
  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontServicePrincipalReadOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${FrontendBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  LoginDemoVideoBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LoginDemoVideoBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowPublicRead
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub '${LoginDemoVideoBucket.Arn}/*'

Outputs:
  FrontendUrl:
    Description: 'CloudFront Distribution URL'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-FrontendUrl'

  # If custom domain is used, expose that too
  CustomDomainUrl:
    Condition: UseCustomDomain
    Description: 'Custom domain URL'
    Value: !Sub 'https://${DomainName}'
    Export:
      Name: !Sub '${AWS::StackName}-CustomDomainUrl'

  BucketName:
    Description: 'S3 bucket name for frontend assets'
    Value: !Ref FrontendBucket
    Export:
      Name: !Sub '${AWS::StackName}-BucketName'

  DistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub '${AWS::StackName}-DistributionId'

  LoginDemoVideoBucketName:
    Description: 'S3 bucket name containing the login demo marketing video'
    Value: !Ref LoginDemoVideoBucket
    Export:
      Name: !Sub '${AWS::StackName}-LoginDemoVideoBucketName'

  LoginDemoVideoUrl:
    Description: 'Public URL for the intro marketing video (legacy export name)'
    Value: !Sub 'https://${LoginDemoVideoBucket}.s3.${AWS::Region}.amazonaws.com/${IntroVideoObjectKey}'
    Export:
      Name: !Sub '${AWS::StackName}-LoginDemoVideoUrl'

  IntroVideoUrl:
    Description: 'Public URL for the intro marketing video'
    Value: !Sub 'https://${LoginDemoVideoBucket}.s3.${AWS::Region}.amazonaws.com/${IntroVideoObjectKey}'
    Export:
      Name: !Sub '${AWS::StackName}-IntroVideoUrl'

  PaynoteDemoVideoUrl:
    Description: 'Public URL for the PayNote walkthrough marketing video'
    Value: !Sub 'https://${LoginDemoVideoBucket}.s3.${AWS::Region}.amazonaws.com/${PaynoteDemoVideoObjectKey}'
    Export:
      Name: !Sub '${AWS::StackName}-PaynoteDemoVideoUrl'

  /v1/activity/{accountNumber}:
    get:
      summary: List account activity combining pending holds and posted transactions
      tags: *ref_0
      parameters:
        - name: accountNumber
          in: path
          required: true
          schema:
            type: string
            minLength: 10
            maxLength: 10
        - name: limit
          in: query
          schema:
            type: number
            minimum: 0
            exclusiveMinimum: 0
        - name: cursor
          in: query
          schema:
            type: string
      operationId: listActivity
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      discriminator:
                        propertyName: kind
                      oneOf:
                        - type: object
                          properties:
                            kind:
                              type: string
                              enum:
                                - HOLD_CREATED
                            holdId:
                              type: string
                            amountMinor:
                              type: integer
                            description:
                              type: string
                            createdAt:
                              type: string
                              format: date-time
                            counterpartyAccountNumber:
                              type: string
                            createdByUserId:
                              type: string
                            idempotencyKeyHash:
                              type: string
                          required:
                            - kind
                            - holdId
                            - amountMinor
                            - createdAt
                        - type: object
                          properties:
                            kind:
                              type: string
                              enum:
                                - HOLD_RELEASED
                            holdId:
                              type: string
                            amountMinor:
                              type: integer
                            description:
                              type: string
                            releasedAt:
                              type: string
                              format: date-time
                            releaseReason:
                              type: string
                          required:
                            - kind
                            - holdId
                            - amountMinor
                            - releasedAt
                        - type: object
                          properties:
                            kind:
                              type: string
                              enum:
                                - HOLD_CAPTURED
                            holdId:
                              type: string
                            amountMinor:
                              type: integer
                            description:
                              type: string
                            capturedAt:
                              type: string
                              format: date-time
                            transactionId:
                              type: string
                            counterpartyAccountNumber:
                              type: string
                          required:
                            - kind
                            - holdId
                            - amountMinor
                            - capturedAt
                            - transactionId
                            - counterpartyAccountNumber
                        - type: object
                          properties:
                            kind:
                              type: string
                              enum:
                                - HOLD_FAILED
                            holdId:
                              type: string
                            amountMinor:
                              type: integer
                            description:
                              type: string
                            failedAt:
                              type: string
                              format: date-time
                            failureCode:
                              type: string
                              enum:
                                - INSUFFICIENT_FUNDS
                                - STATE_MISMATCH
                                - VALIDATION
                                - INTERNAL
                            failureMessage:
                              type: string
                          required:
                            - kind
                            - holdId
                            - amountMinor
                            - failedAt
                            - failureCode
                        - type: object
                          properties:
                            kind:
                              type: string
                              enum:
                                - POSTED_TRANSACTION
                            transactionId:
                              type: string
                            amountMinor:
                              type: integer
                            description:
                              type: string
                            postedAt:
                              type: string
                              format: date-time
                            originHoldId:
                              type: string
                            side:
                              type: string
                              enum:
                                - DEBIT
                                - CREDIT
                            type:
                              type: string
                            status:
                              type: string
                            counterpartyAccountNumber:
                              type: string
                          required:
                            - kind
                            - transactionId
                            - amountMinor
                            - postedAt
                            - side
                            - type
                            - status
                  nextCursor:
                    type: string
                required:
                  - items
        '400':

document:
  name: Synchrony Merchant
  type: MyOS/Agent
  description: Merchant-facing agent that forwards PayNote Delivery requests.

  agreementId:
    type: Text
    description: Synchrony-side agreement reference.

  merchantId:
    type: Text
    description: Merchant identifier.

  contracts:
    merchantChannel:
      type: MyOS/MyOS Timeline Channel
      description: Merchant participant channel.

    synchronyChannel:
      type: MyOS/MyOS Timeline Channel
      description: Synchrony participant channel.

    sendPayNote:
      type: Conversation/Operation
      channel: merchantChannel
      description: Submit a PayNote Delivery for processing.

    sendPayNoteImpl:
      type: Conversation/Sequential Workflow Operation
      operation: sendPayNote
      steps:
        - name: Request Delivery Bootstrap
          type: Conversation/JavaScript Code
          code: |
            return {
              events: [
                event.message.request
              ]
            };

    anchors:
      type: MyOS/Document Anchors
      payNoteDeliveries:
        type: MyOS/Document Anchor
        description: Merchant's PayNote Delivery documents.
      payNotes:
        type: MyOS/Document Anchor
        description: Delivered merchant's PayNote documents.

channelBindings:
  merchantChannel:
    accountId: # TODO: fill with MYOS_ACCOUNT_ID
  synchronyChannel:
    accountId: 7f85ccd0-69d7-4c5d-997e-ba6d4e139de5 # keep this unchanged
